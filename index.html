<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>午餐吃什么随机转盘</title>
  <style>
    :root {
      --bg: #fff7ed;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #f97316;
      --primary-dark: #ea580c;
      --shadow: 0 20px 60px rgba(124, 45, 18, .18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, #fed7aa 0 18%, transparent 19%),
        radial-gradient(circle at 85% 80%, #fde68a 0 15%, transparent 16%),
        linear-gradient(135deg, #fff7ed, #fffbeb);
      color: var(--text);
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 28px;
      align-items: center;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(251,146,60,.25);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(10px);
    }

    .wheel-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 520px;
    }

    .pointer {
      position: absolute;
      top: 28px;
      z-index: 4;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 46px solid #dc2626;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.25));
    }

    canvas {
      width: min(500px, 100%);
      height: auto;
      aspect-ratio: 1;
      border-radius: 50%;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .18);
      background: #fff;
    }

    .hub {
      position: absolute;
      width: 104px;
      height: 104px;
      border-radius: 999px;
      border: 8px solid #fff;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 10px 30px rgba(234, 88, 12, .36);
      user-select: none;
      z-index: 3;
    }

    .panel h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.1;
    }

    .panel { min-width: 0; }

    .panel p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    .result {
      min-height: 112px;
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 20px;
      border-radius: 22px;
      background: #fff7ed;
      border: 1px dashed #fdba74;
      margin-bottom: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 14px;
    }

    .food {
      font-size: clamp(34px, 6vw, 56px);
      font-weight: 900;
      color: #c2410c;
      min-height: 1.2em;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(234, 88, 12, .28);
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:active { transform: translateY(1px) scale(.99); }
    button:disabled { cursor: not-allowed; filter: grayscale(.25); opacity: .75; }

    .options {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px 7px 11px;
      border-radius: 999px;
      background: white;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 14px;
    }

    .chip-remove {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 50%;
      background: transparent;
      color: #9a3412;
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      box-shadow: none;
    }

    .chip-remove:hover { background: #ffedd5; transform: none; }

    .option-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px;
      gap: 8px;
      margin-top: 14px;
    }

    .option-editor input {
      min-width: 0;
      border: 1px solid #fdba74;
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
      background: white;
      font: inherit;
      outline: none;
    }

    .option-editor input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, .16);
    }

    .add-option {
      width: 52px;
      height: 48px;
      padding: 0;
      border-radius: 14px;
      font-size: 28px;
    }

    .option-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
    }

    .option-message { min-height: 1.4em; }

    .reset-options {
      width: auto;
      padding: 4px;
      border-radius: 4px;
      background: transparent;
      color: #c2410c;
      font-size: 13px;
      font-weight: 700;
      box-shadow: none;
    }

    .reset-options:hover { transform: none; text-decoration: underline; }

    @media (max-width: 820px) {
      body { padding: 12px; }
      .app { grid-template-columns: minmax(0, 1fr); padding: 16px; border-radius: 20px; }
      .wheel-wrap { min-height: auto; padding-top: 18px; }
      .pointer { top: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="wheel-wrap" aria-label="午餐随机转盘">
      <div class="pointer" aria-hidden="true"></div>
      <canvas id="wheel" width="1000" height="1000"></canvas>
      <div class="hub">LUNCH</div>
    </section>

    <section class="panel">
      <h1>午餐吃什么？</h1>
      <p>点一下，让命运替 Boss 做选择。停在哪个吃哪个，禁止反悔。</p>

      <div class="result">
        <div class="label">今天中午：</div>
        <div id="result" class="food">？</div>
      </div>

      <button id="spinBtn">开始转盘</button>

      <form class="option-editor" id="optionForm">
        <input id="optionInput" type="text" maxlength="12" placeholder="临时加一个午餐选项" aria-label="新增午餐选项" autocomplete="off" />
        <button class="add-option" type="submit" aria-label="添加选项" title="添加选项">+</button>
      </form>
      <div class="option-meta">
        <span id="optionMessage" class="option-message" role="status" aria-live="polite"></span>
        <button id="syncOptions" class="reset-options" type="button">刷新选项</button>
      </div>
      <div class="options" id="options"></div>
    </section>
  </main>

  <script>
    const defaultItems = ["平成屋", "海鲜面", "卤肉饭", "拉面", "饺子", "KFC", "麦麦", "麻辣香锅", "米线", "大米先生", "foodbowl"];
    const colors = ["#fb923c", "#facc15", "#34d399", "#60a5fa", "#a78bfa", "#f472b6", "#f87171", "#2dd4bf", "#c084fc", "#04d299" ,"#f07171"];
    let items = [...defaultItems];

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const resultEl = document.getElementById("result");
    const optionsEl = document.getElementById("options");
    const optionForm = document.getElementById("optionForm");
    const optionInput = document.getElementById("optionInput");
    const optionMessage = document.getElementById("optionMessage");
    const syncOptionsButton = document.getElementById("syncOptions");

    const size = canvas.width;
    const cx = size / 2;
    const cy = size / 2;
    const radius = size * 0.46;
    let rotation = 0;
    let spinning = false;

    function sliceAngle() {
      return Math.PI * 2 / items.length;
    }

    function renderOptions() {
      optionsEl.replaceChildren();
      items.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.append(document.createTextNode(item));
        optionsEl.append(chip);
      });
    }

    function refreshWheel(message) {
      rotation = 0;
      resultEl.textContent = "？";
      optionMessage.textContent = message;
      renderOptions();
      drawWheel();
    }

    async function syncOptions(showMessage = true) {
      if (spinning) return;
      syncOptionsButton.disabled = true;
      try {
        const response = await fetch("/api/options", { cache: "no-store" });
        const data = await response.json();
        if (!response.ok || !Array.isArray(data.items) || data.items.length < 2) {
          throw new Error(data.error || "Invalid shared options");
        }
        items = data.items;
        refreshWheel(showMessage ? `已同步 ${items.length} 个选项` : "");
      } catch (error) {
        console.error("Failed to sync shared options", error);
        if (showMessage) optionMessage.textContent = "共享同步失败，暂用当前选项";
      } finally {
        syncOptionsButton.disabled = false;
      }
    }

    function drawWheel() {
      const slice = sliceAngle();
      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      for (let i = 0; i < items.length; i++) {
        const start = i * slice;
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,.85)";
        ctx.lineWidth = 8;
        ctx.stroke();

        ctx.save();
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#111827";
        ctx.font = "bold 46px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif";
        ctx.shadowColor = "rgba(255,255,255,.75)";
        ctx.shadowBlur = 4;
        ctx.fillText(items[i], radius - 54, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.lineWidth = 18;
      ctx.strokeStyle = "#fff";
      ctx.stroke();

      ctx.restore();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function selectedIndex() {
      const slice = sliceAngle();
      // 指针在正上方，即画布角度 -90°。
      const pointerAngle = (Math.PI * 1.5 - rotation) % (Math.PI * 2);
      const normalized = (pointerAngle + Math.PI * 2) % (Math.PI * 2);
      return Math.floor(normalized / slice) % items.length;
    }

    function spin() {
      if (spinning) return;
      const slice = sliceAngle();
      spinning = true;
      spinBtn.disabled = true;
      resultEl.textContent = "转着呢…";

      const startRotation = rotation;
      const winner = Math.floor(Math.random() * items.length);
      const winnerCenter = winner * slice + slice / 2;
      const targetPointer = Math.PI * 1.5;
      const currentFullTurns = Math.ceil(startRotation / (Math.PI * 2));
      const extraTurns = 6 + Math.floor(Math.random() * 4);
      const targetRotation = currentFullTurns * Math.PI * 2 + extraTurns * Math.PI * 2 + targetPointer - winnerCenter;
      const duration = 4200;
      const start = performance.now();

      function animate(now) {
        const t = Math.min((now - start) / duration, 1);
        rotation = startRotation + (targetRotation - startRotation) * easeOutCubic(t);
        drawWheel();

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          rotation = targetRotation % (Math.PI * 2);
          drawWheel();
          const idx = selectedIndex();
          resultEl.textContent = items[idx];
          spinBtn.disabled = false;
          spinning = false;
        }
      }

      requestAnimationFrame(animate);
    }

    optionForm.addEventListener("submit", async event => {
      event.preventDefault();
      if (spinning) {
        optionMessage.textContent = "请等转盘停下再修改";
        return;
      }
      const value = optionInput.value.trim();

      if (!value) {
        optionMessage.textContent = "请输入选项名称";
        optionInput.focus();
        return;
      }
      if (items.some(item => item.toLowerCase() === value.toLowerCase())) {
        optionMessage.textContent = "这个选项已经有了";
        optionInput.select();
        return;
      }
      const submitButton = optionForm.querySelector("button[type='submit']");
      submitButton.disabled = true;
      optionMessage.textContent = "正在保存…";
      try {
        const response = await fetch("/api/options", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: value })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Save failed");
        items = data.items;
        optionInput.value = "";
        refreshWheel(`已共享“${value}”`);
      } catch (error) {
        optionMessage.textContent = error.message || "保存失败，请稍后重试";
      } finally {
        submitButton.disabled = false;
        optionInput.focus();
      }
    });

    syncOptionsButton.addEventListener("click", () => syncOptions(true));
    spinBtn.addEventListener("click", spin);
    renderOptions();
    drawWheel();
    syncOptions(true);
    setInterval(() => {
      if (document.visibilityState === "visible") syncOptions(false);
    }, 15000);
  </script>
</body>
</html>
