<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>午餐吃什么随机转盘</title>
  <style>
    :root {
      --bg: #fff7ed;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #f97316;
      --primary-dark: #ea580c;
      --shadow: 0 20px 60px rgba(124, 45, 18, .18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, #fed7aa 0 18%, transparent 19%),
        radial-gradient(circle at 85% 80%, #fde68a 0 15%, transparent 16%),
        linear-gradient(135deg, #fff7ed, #fffbeb);
      color: var(--text);
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 28px;
      align-items: center;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(251,146,60,.25);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      backdrop-filter: blur(10px);
    }

    .wheel-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 520px;
    }

    .pointer {
      position: absolute;
      top: 28px;
      z-index: 4;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 46px solid #dc2626;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.25));
    }

    canvas {
      width: min(500px, 100%);
      height: auto;
      aspect-ratio: 1;
      border-radius: 50%;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .18);
      background: #fff;
    }

    .hub {
      position: absolute;
      width: 104px;
      height: 104px;
      border-radius: 999px;
      border: 8px solid #fff;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 10px 30px rgba(234, 88, 12, .36);
      user-select: none;
      z-index: 3;
    }

    .panel h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.1;
    }

    .panel { min-width: 0; }

    .panel p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    .result {
      min-height: 112px;
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 20px;
      border-radius: 22px;
      background: #fff7ed;
      border: 1px dashed #fdba74;
      margin-bottom: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 14px;
    }

    .food {
      font-size: clamp(34px, 6vw, 56px);
      font-weight: 900;
      color: #c2410c;
      min-height: 1.2em;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(234, 88, 12, .28);
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:active { transform: translateY(1px) scale(.99); }
    button:disabled { cursor: not-allowed; filter: grayscale(.25); opacity: .75; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }

    .filter-btn {
      flex: 1 0 auto;
      min-width: 0;
      border: 2px solid;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    .filter-btn:active {
      transform: scale(.96);
    }

    .filter-off {
      background: white;
      border-color: #e5e7eb;
      color: #6b7280;
    }

    .filter-off:hover {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .filter-on {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: var(--primary);
      color: white;
      box-shadow: 0 2px 10px rgba(234, 88, 12, .28);
      transform: translateY(-1px);
    }

    .filter-on:active {
      transform: scale(.96) translateY(0);
    }

    .filter-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    @media (min-width: 601px) and (max-width: 820px) {
      /* Tablet: buttons 3-col, full width each row */
      .filter-btn { padding: 11px 14px; font-size: 14px; }
    }

    @media (max-width: 600px) {
      .filters { gap: 6px; margin-bottom: 12px; }
      .filter-btn {
        flex: 1 0 calc(50% - 10px);
        padding: 12px 10px;
        font-size: 14px;
        text-align: center;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .filter-count {
        flex: 0 0 auto;
        width: 44px;
        padding: 0 4px;
        font-size: 13px;
      }
    }

    @media (max-width: 360px) {
      .filter-btn { flex: 1 0 100%; }
    }

    .options {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px 7px 11px;
      border-radius: 999px;
      background: white;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 14px;
    }

    .chip-remove {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 50%;
      background: transparent;
      color: #9a3412;
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      box-shadow: none;
    }

    .chip-remove:hover { background: #ffedd5; transform: none; }

    .option-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px;
      gap: 8px;
      margin-top: 14px;
    }

    .option-editor input {
      min-width: 0;
      border: 1px solid #fdba74;
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--text);
      background: white;
      font: inherit;
      outline: none;
    }

    .option-editor input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, .16);
    }

    .add-option {
      width: 52px;
      height: 48px;
      padding: 0;
      border-radius: 14px;
      font-size: 28px;
    }

    .option-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
    }

    .option-message { min-height: 1.4em; }

    .reset-options {
      width: auto;
      padding: 4px;
      border-radius: 4px;
      background: transparent;
      color: #c2410c;
      font-size: 13px;
      font-weight: 700;
      box-shadow: none;
    }

    .reset-options:hover { transform: none; text-decoration: underline; }

    @media (max-width: 820px) {
      body { padding: 12px; }
      .app { grid-template-columns: minmax(0, 1fr); padding: 16px; border-radius: 20px; }
      .wheel-wrap { min-height: auto; padding-top: 18px; }
      .pointer { top: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="wheel-wrap" aria-label="午餐随机转盘">
      <div class="pointer" aria-hidden="true"></div>
      <canvas id="wheel" width="1000" height="1000"></canvas>
      <div class="hub">LUNCH</div>
    </section>

    <section class="panel">
      <h1>午餐吃什么？</h1>
      <p>点一下，让命运替你做选择。停在哪个吃哪个，禁止反悔。</p>

      <div class="result">
        <div class="label">今天中午：</div>
        <div id="result" class="food">？</div>
      </div>

      <div class="filters">
          <button class="filter-btn filter-off" id="filterNoSpicy" data-filter="不吃辣" type="button">🌶️ 不吃辣</button>
          <button class="filter-btn filter-off" id="filterBossHere" data-filter="老板在" type="button">👔 老板在</button>
          <button class="filter-btn filter-off" id="filterNoNoodles" data-filter="不吃面" type="button">🍜 不吃面</button>
          <span class="filter-count" id="filterCount"></span>
        </div>

      <button id="spinBtn">开始转盘</button>

      <form class="option-editor" id="optionForm">
        <input id="optionInput" type="text" maxlength="12" placeholder="增加一个共享午餐选项" aria-label="新增午餐选项" autocomplete="off" />
        <button class="add-option" type="submit" aria-label="添加选项" title="添加选项">+</button>
      </form>
      <div class="option-meta">
        <span id="optionMessage" class="option-message" role="status" aria-live="polite"></span>
        <span>
          <button id="syncOptions" class="reset-options" type="button">刷新选项</button>
          <button id="resetOptions" class="reset-options" type="button">恢复默认</button>
        </span>
      </div>
      <div class="options" id="options"></div>
    </section>
  </main>

  <script>
    const defaultItems = [
      { name: "平成屋", tags: [] },
      { name: "海鲜面", tags: ["面"] },
      { name: "卤肉饭", tags: [] },
      { name: "兰州拉面", tags: ["面"] },
      { name: "喜家德", tags: [] },
      { name: "KFC", tags: ["老板不宜"] },
      { name: "麦麦", tags: ["老板不宜"] },
      { name: "麻辣香锅", tags: ["辣"] },
      { name: "云南米线", tags: ["辣", "老板不宜"] },
      { name: "大米先生", tags: ["老板不宜"] },
      { name: "foodbowl", tags: [] },
    ];
    const colors = ["#fb923c", "#facc15", "#34d399", "#60a5fa", "#a78bfa", "#f472b6", "#f87171", "#2dd4bf", "#c084fc", "#04d299" ,"#f07171", "#f97316", "#eab308"];
    let items = [...defaultItems];

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const resultEl = document.getElementById("result");
    const optionsEl = document.getElementById("options");
    const optionForm = document.getElementById("optionForm");
    const optionInput = document.getElementById("optionInput");
    const optionMessage = document.getElementById("optionMessage");
    const syncOptionsButton = document.getElementById("syncOptions");
    const resetOptionsButton = document.getElementById("resetOptions");
    const filterBtns = {
      不吃辣: document.getElementById("filterNoSpicy"),
      老板在: document.getElementById("filterBossHere"),
      不吃面: document.getElementById("filterNoNoodles"),
    };
    const activeFilters = { 不吃辣: false, 老板在: false, 不吃面: false };

    const size = canvas.width;
    const cx = size / 2;
    const cy = size / 2;
    const radius = size * 0.46;
    let rotation = 0;
    let spinning = false;

    function sliceAngle() {
      return Math.PI * 2 / items.length;
    }

    function getFilteredItems() {
      return items.filter(item => {
        if (activeFilters.不吃辣 && item.tags.includes("辣")) return false;
        if (activeFilters.老板在 && item.tags.includes("老板不宜")) return false;
        if (activeFilters.不吃面 && item.tags.includes("面")) return false;
        return true;
      });
    }

    function applyFilterCount() {
      const filtered = getFilteredItems();
      const total = items.length;
      document.getElementById("filterCount").textContent = `${filtered.length}/${total}`;
      return filtered;
    }

    function updateFilterButton(btn) {
      const key = btn.dataset.filter;
      const active = activeFilters[key];
      btn.classList.toggle("filter-on", active);
      btn.classList.toggle("filter-off", !active);
    }

    function renderOptions() {
      optionsEl.replaceChildren();
      const displayItems = applyFilterCount();
      displayItems.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.append(document.createTextNode(item.name));
        const removeButton = document.createElement("button");
        removeButton.className = "chip-remove";
        removeButton.type = "button";
        removeButton.textContent = "×";
        removeButton.setAttribute("aria-label", `停用${item.name}`);
        removeButton.title = "暂时停用";
        removeButton.addEventListener("click", () => disableOption(item.name, removeButton));
        chip.append(removeButton);
        optionsEl.append(chip);
      });
    }

    Object.values(filterBtns).forEach(btn => {
      btn.addEventListener("click", () => {
        if (spinning) {
          optionMessage.textContent = "请等转盘停下再操作";
          return;
        }
        const key = btn.dataset.filter;
        activeFilters[key] = !activeFilters[key];
        updateFilterButton(btn);
        rotation = 0;
        resultEl.textContent = "？";
        const filtered = applyFilterCount();
        if (filtered.length < 2) {
          optionMessage.textContent = "筛选后选项不足 2 个，请调整筛选条件";
        } else {
          optionMessage.textContent = "";
        }
        renderOptions();
        drawWheel();
      });
    });

    async function disableOption(item, button) {
      if (spinning) {
        optionMessage.textContent = "请等转盘停下再修改";
        return;
      }
      button.disabled = true;
      optionMessage.textContent = `正在停用“${item}”…`;
      try {
        const response = await fetch("/api/options", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: item })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Disable failed");
        items = data.items.map(n => typeof n === "string" ? { name: n, tags: [] } : n);
        refreshWheel(`已停用“${item}”`);
      } catch (error) {
        optionMessage.textContent = error.message || "停用失败，请稍后重试";
        button.disabled = false;
      }
    }

    function refreshWheel(message) {
      rotation = 0;
      resultEl.textContent = "？";
      optionMessage.textContent = message;
      renderOptions();
      drawWheel();
    }

    async function syncOptions(showMessage = true) {
      if (spinning) return;
      syncOptionsButton.disabled = true;
      try {
        const response = await fetch("/api/options", { cache: "no-store" });
        const data = await response.json();
        if (!response.ok || !Array.isArray(data.items) || data.items.length < 2) {
          throw new Error(data.error || "Invalid shared options");
        }
        items = data.items.map(n => typeof n === "string" ? { name: n, tags: [] } : n);
        refreshWheel(showMessage ? `已同步 ${items.length} 个选项` : "");
      } catch (error) {
        console.error("Failed to sync shared options", error);
        if (showMessage) optionMessage.textContent = "共享同步失败，暂用当前选项";
      } finally {
        syncOptionsButton.disabled = false;
      }
    }

    function drawWheel() {
      const drawItems = getFilteredItems();
      if (drawItems.length < 2) {
        ctx.clearRect(0, 0, size, size);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.fillStyle = "#d1d5db";
        ctx.font = "bold 48px -apple-system, 'PingFang SC', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("选项不足", 0, 0);
        ctx.restore();
        return;
      }

      const slice = Math.PI * 2 / drawItems.length;
      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      for (let i = 0; i < drawItems.length; i++) {
        const start = i * slice;
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,.85)";
        ctx.lineWidth = 8;
        ctx.stroke();

        ctx.save();
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#111827";
        ctx.font = "bold 46px -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif";
        ctx.shadowColor = "rgba(255,255,255,.75)";
        ctx.shadowBlur = 4;
        ctx.fillText(drawItems[i].name, radius - 54, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.lineWidth = 18;
      ctx.strokeStyle = "#fff";
      ctx.stroke();

      ctx.restore();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function selectedIndex() {
      const drawItems = getFilteredItems();
      const slice = Math.PI * 2 / drawItems.length;
      const pointerAngle = (Math.PI * 1.5 - rotation) % (Math.PI * 2);
      const normalized = (pointerAngle + Math.PI * 2) % (Math.PI * 2);
      return Math.floor(normalized / slice) % drawItems.length;
    }

    function spin() {
      if (spinning) return;
      const drawItems = getFilteredItems();
      if (drawItems.length < 2) {
        optionMessage.textContent = "选项不足 2 个，无法转盘";
        return;
      }

      const slice = Math.PI * 2 / drawItems.length;
      spinning = true;
      spinBtn.disabled = true;
      resultEl.textContent = "转着呢…";

      const startRotation = rotation;
      const winner = Math.floor(Math.random() * drawItems.length);
      const winnerCenter = winner * slice + slice / 2;
      const targetPointer = Math.PI * 1.5;
      const currentFullTurns = Math.ceil(startRotation / (Math.PI * 2));
      const extraTurns = 6 + Math.floor(Math.random() * 4);
      const targetRotation = currentFullTurns * Math.PI * 2 + extraTurns * Math.PI * 2 + targetPointer - winnerCenter;
      const duration = 4200;
      const start = performance.now();

      function animate(now) {
        const t = Math.min((now - start) / duration, 1);
        rotation = startRotation + (targetRotation - startRotation) * easeOutCubic(t);
        drawWheel();

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          rotation = targetRotation % (Math.PI * 2);
          drawWheel();
          const idx = selectedIndex();
          resultEl.textContent = drawItems[idx].name;
          spinBtn.disabled = false;
          spinning = false;
        }
      }

      requestAnimationFrame(animate);
    }

    optionForm.addEventListener("submit", async event => {
      event.preventDefault();
      if (spinning) {
        optionMessage.textContent = "请等转盘停下再修改";
        return;
      }
      const value = optionInput.value.trim();

      if (!value) {
        optionMessage.textContent = "请输入选项名称";
        optionInput.focus();
        return;
      }
      if (items.some(item => item.name.toLowerCase() === value.toLowerCase())) {
        optionMessage.textContent = "这个选项已经有了";
        optionInput.select();
        return;
      }
      const submitButton = optionForm.querySelector("button[type='submit']");
      submitButton.disabled = true;
      optionMessage.textContent = "正在保存…";
      try {
        const response = await fetch("/api/options", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: value })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Save failed");
        items = data.items.map(n => typeof n === "string" ? { name: n, tags: [] } : n);
        optionInput.value = "";
        refreshWheel(`已共享“${value}”`);
      } catch (error) {
        optionMessage.textContent = error.message || "保存失败，请稍后重试";
      } finally {
        submitButton.disabled = false;
        optionInput.focus();
      }
    });

    syncOptionsButton.addEventListener("click", () => syncOptions(true));
    resetOptionsButton.addEventListener("click", async () => {
      if (spinning) {
        optionMessage.textContent = "请等转盘停下再修改";
        return;
      }
      if (!confirm("恢复默认选项？后来新增的共享选项会被暂时停用。")) return;
      resetOptionsButton.disabled = true;
      optionMessage.textContent = "正在恢复默认…";
      try {
        const response = await fetch("/api/options", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "reset" })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Reset failed");
        items = data.items.map(n => typeof n === "string" ? { name: n, tags: [] } : n);
        refreshWheel("已恢复默认选项");
      } catch (error) {
        optionMessage.textContent = error.message || "恢复失败，请稍后重试";
      } finally {
        resetOptionsButton.disabled = false;
      }
    });
    spinBtn.addEventListener("click", spin);
    renderOptions();
    drawWheel();
    syncOptions(true);
    setInterval(() => {
      if (document.visibilityState === "visible") syncOptions(false);
    }, 15000);
  </script>
</body>
</html>
